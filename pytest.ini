[pytest]
# Add the project root to sys.path so `from backend.xxx import ...` works
# when running `pytest tests/ -v` directly (without `python -m pytest`).
pythonpath = .
testpaths = tests
asyncio_mode = strict
filterwarnings =
    ignore::sqlalchemy.exc.MovedIn20Warning
    ignore::DeprecationWarning
    ignore::pytest.PytestUnraisableExceptionWarning
